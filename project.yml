name: MiraNote
options:
  bundleIdPrefix: ai.miranote
  deploymentTarget:
    iOS: "17.0"
packages:
  MiraNoteKit:
    path: MiraNoteKit
settings:
  base:
    SWIFT_VERSION: "5.0"
    GENERATE_INFOPLIST_FILE: YES
targets:
  MiraNote:
    type: application
    platform: iOS
    sources:
      - App/Sources
      - App/Resources
    dependencies:
      - package: MiraNoteKit
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Fraunces.ttf
        NSMicrophoneUsageDescription: MiraNote uses the microphone to turn your voice into notes.
        NSCameraUsageDescription: MiraNote uses the camera to add photos to your memory pages.
        NSPhotoLibraryAddUsageDescription: MiraNote saves your exported memory pages to your photo library.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: false
    scheme:
      testTargets:
        - MiraNoteTests
        - MiraNoteUITests
      gatherCoverageData: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.miranote.app
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
  MiraNoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - App/Tests
    dependencies:
      - target: MiraNote
  MiraNoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - App/UITests
    dependencies:
      - target: MiraNote
